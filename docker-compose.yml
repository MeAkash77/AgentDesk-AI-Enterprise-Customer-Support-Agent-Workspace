# ══════════════════════════════════════════════════════════════════
# AgentDesk — Docker Compose
#
# DEV MODE (default): SQLite + no Redis. Just set OPENAI_API_KEY.
#   docker compose up
#
# PROD MODE: Postgres + Redis included.
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ══════════════════════════════════════════════════════════════════

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # SQLite by default — no database container needed
      DATABASE_URL: sqlite+aiosqlite:////app/data/agentdesk.db
      APP_ENV: development
    volumes:
      # Persist SQLite file across restarts
      - agentdesk_data:/app/data
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/agentdesk.db
      VOICE_MODE: ${VOICE_MODE:-demo}
    volumes:
      - agentdesk_data:/app/data
    command: python run_agent.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  agentdesk_data:
